# Netlify config for Solace Brazilian Steakhouse (static site)
[build]
  publish = "."
  # No build command needed – plain HTML/CSS/JS
  # Install function dependencies (used by reservations/admin + storage)
  command = "npm --prefix functions install"

[functions]
  directory = "functions"

# Short URL for Google reviews (share: solacebraziliansteakhouse.com/review)
[[redirects]]
  from = "/review"
  to = "https://search.google.com/local/writereview?placeid=ChIJHxyLbkUH44kRaTzjRQ7Dm1s"
  status = 302
  force = true

# Security headers (improves SecurityHeaders.com score; CSP allows current inline scripts + CDNs)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    # frame-ancestors + img https: for Unsplash; fonts + Font Awesome CDN; inline JS/CSS used site-wide
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' data: https://fonts.googleapis.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; connect-src 'self'; object-src 'self'; media-src 'self' https:; upgrade-insecure-requests"
