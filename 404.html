  <style>
    :root {
      --gold: #C8A24A;
      --black: #050505;
      --surface: #161616;
      --border: #2A2A2A;
      --white: #F5F5F5;
      --gray: #A0A0A0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--black);
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
    }
    h1 {
      font-family: Georgia, 'Playfair Display', serif;
      font-size: 1.75rem;
      color: var(--gold);
      margin: 0 0 12px;
    }
    p { color: var(--gray); margin: 0 0 24px; line-height: 1.6; }
    .code { font-size: 3rem; font-weight: 800; color: var(--white); margin-bottom: 8px; }
    a {
      display: inline-block;
      margin: 6px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
    }
    .primary {
      background: var(--gold);
      color: var(--black);
    }
    .secondary {
      border: 1px solid var(--border);
      color: var(--gray);
    }
    .primary:hover { filter: brightness(1.05); }
    .secondary:hover { color: var(--gold); border-color: var(--gold); }
  </style>
</head>

      <a class="primary" href="/index.html">Home</a>
      <a class="secondary" href="/reserve.html">Reserve</a>
    </div>
  </div>
</body>
