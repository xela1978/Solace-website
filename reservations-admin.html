<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservations Admin | Solace</title>
  <meta name="description" content="Manage Solace reservations (requires key).">
  <link rel="stylesheet" href="css/site-fonts.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="css/site-fonts.css"></noscript>
  <style>
    :root{
      --gold:#C8A24A;
      --gold-dark:#9A7A2F;
      --black:#050505;
      --surface:#161616;
      --surface-border:#2A2A2A;
      --white:#F5F5F5;
      --gray:#A0A0A0;
      --radius:16px;
      --radius-lg:24px;
      --radius-btn:14px;
      --transition:0.3s ease;
      --shadow:0 10px 40px rgba(0,0,0,0.25);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:var(--black);
      color:var(--white);
      line-height:1.6;
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:56px 20px;
    }
    h1{
      font-family:'Playfair Display',serif;
      margin:0 0 8px;
      font-size:clamp(2rem,3vw,2.6rem);
    }
    .sub{
      color:var(--gray);
      margin:0 0 22px;
      max-width:720px;
    }
    .tabs{
      display:flex;
      gap:10px;
      margin:16px 0 4px;
      flex-wrap:wrap;
    }
    .tab-btn{
      appearance:none;
      border:1px solid rgba(42,42,42,1);
      background:#0f0f0f;
      color:var(--gray);
      padding:10px 14px;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      transition:background var(--transition), border-color var(--transition), color var(--transition);
    }
    .tab-btn:hover{ border-color:rgba(200,162,74,0.6); color:var(--white); }
    .tab-btn.active{
      background:var(--gold);
      border-color:var(--gold);
      color:var(--black);
    }
    .status-btn{
      /* Inherits base button styles; keep a clear border for actions */
    }
    .delete-btn{
      background: rgba(255,107,107,0.10);
      border: 1px solid rgba(255,107,107,0.55);
      color: #ffb3b3;
      padding:10px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .delete-btn:hover{
      background: rgba(255,107,107,0.18);
      border-color: rgba(255,107,107,0.85);
      color: #ffd3d3;
    }
    .delete-btn svg{ display:block; }
    .actions-cell{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:flex-start;
    }
    .card{
      background:var(--surface);
      border:1px solid var(--surface-border);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
      padding:20px;
    }
    form{ display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; }
    .field{ flex:1; min-width:240px; display:flex; flex-direction:column; gap:8px; }
    label{ font-weight:800; }
    input{
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(42,42,42,1);
      background:#0f0f0f;
      color:var(--white);
      outline:none;
      font-family:inherit;
    }
    button{
      padding:12px 18px;
      border-radius:var(--radius-btn);
      border:none;
      background:var(--gold);
      color:var(--black);
      font-weight:900;
      cursor:pointer;
      transition:transform var(--transition), background var(--transition);
      white-space:nowrap;
    }
    button:hover{ background:var(--gold-dark); transform:translateY(-2px); }
    .status{
      margin-top:14px;
      color:var(--gray);
      font-weight:600;
    }
    .error{ color:#ff6b6b; }
    .table-wrap{ margin-top:18px; overflow:auto; }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:0.95rem;
      min-width:0;
    }
    th, td{
      padding:12px 10px;
      border-bottom:1px solid rgba(42,42,42,0.9);
      vertical-align:top;
    }
    th{
      text-align:left;
      color:var(--gold);
      font-weight:900;
    }
    td{ color:var(--white); }
    .tag{
      display:inline-block;
      padding:4px 10px;
      border:1px solid rgba(200,162,74,0.35);
      border-radius:999px;
      color:var(--gold);
      font-weight:800;
      font-size:0.85rem;
    }
    .empty{
      color:var(--gray);
      margin-top:14px;
      font-weight:700;
    }
    footer{
      color:var(--gray);
      text-align:center;
      padding:18px 20px 28px;
    }
    @media (max-width: 768px){
      .wrap{ padding:42px 16px; }
      thead{ display:none; }
      .table-wrap{ overflow:visible; }
      table{ width:100%; }
      tr{
        display:block;
        border:1px solid rgba(42,42,42,0.9);
        border-radius:var(--radius-lg);
        padding:10px 12px;
        margin-bottom:14px;
        background:rgba(22,22,22,0.9);
      }
      td{
        display:block;
        border-bottom:none;
        padding:8px 0;
      }
      td::before{
        content: attr(data-label);
        display:block;
        color:var(--gold);
        font-weight:900;
        margin-bottom:4px;
      }
      td:last-child{ padding-bottom:0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
  <main id="main-content">
    <h1>Manage reservations</h1>
    <p class="sub">Enter the manager key to load saved reservations. (Server-side protected.)</p>

    <div class="card">
      <form id="loginForm">
        <div class="field">
          <label for="adminKey">Password</label>
          <input id="adminKey" name="adminKey" type="password" placeholder="Enter manager password" required autocomplete="current-password" />
        </div>
        <button type="submit">Access</button>
      </form>

      <div id="reservationTabs" class="tabs" role="tablist" aria-label="Reservation status tabs" style="display:none;">
        <button type="button" id="tabPending" class="tab-btn active" role="tab" aria-selected="true" data-status="pending">Reservations</button>
        <button type="button" id="tabProcessed" class="tab-btn" role="tab" aria-selected="false" data-status="processed">Processed</button>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <div id="results" style="display:none;" class="table-wrap">
        <table aria-label="Reservations">
          <thead>
            <tr>
              <th>Guest</th>
              <th>Contact</th>
              <th>Date/Time</th>
              <th>Party size</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="emptyState" class="empty" style="display:none;">No reservations yet.</div>
      </div>
    </div>
  </main>
    <footer></footer>
  </div>

  <script>
    (function () {
      var form = document.getElementById('loginForm');
      var status = document.getElementById('status');
      var results = document.getElementById('results');
      var tbody = document.getElementById('tbody');
      var emptyState = document.getElementById('emptyState');
      var currentAdminKey = '';
      var currentView = 'pending';
      var reservationTabs = document.getElementById('reservationTabs');
      var tabPending = document.getElementById('tabPending');
      var tabProcessed = document.getElementById('tabProcessed');

      var ADMIN_KEY_STORAGE = 'solaceReservationsAdminKey';
      var ADMIN_VIEW_STORAGE = 'solaceReservationsAdminView';

      function clearAdminKey() {
        try { sessionStorage.removeItem(ADMIN_KEY_STORAGE); } catch (e) { /* ignore */ }
        currentAdminKey = '';
        form.style.display = 'block';
        hideTabs();
      }

      function setAdminKey(key) {
        currentAdminKey = key;
        try { sessionStorage.setItem(ADMIN_KEY_STORAGE, key); } catch (e) { /* ignore */ }
      }

      function showTabs() {
        if (reservationTabs) reservationTabs.style.display = 'flex';
      }

      function hideTabs() {
        if (reservationTabs) reservationTabs.style.display = 'none';
      }

      function setActiveTab(view) {
        currentView = view;
        var isPending = view === 'pending';
        if (tabPending) {
          tabPending.classList.toggle('active', isPending);
          tabPending.setAttribute('aria-selected', isPending ? 'true' : 'false');
        }
        if (tabProcessed) {
          tabProcessed.classList.toggle('active', !isPending);
          tabProcessed.setAttribute('aria-selected', !isPending ? 'true' : 'false');
        }
      }

      function setStatus(msg, isError) {
        status.textContent = msg || '';
        status.classList.toggle('error', !!isError);
      }

      function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>"']/g, function (m) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m];
        });
      }

      async function loadReservations(adminKey, status) {
        var res = await fetch('/.netlify/functions/reservations-admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          cache: 'no-store',
          body: JSON.stringify({ adminKey: adminKey, status: status })
        });

        if (!res.ok) {
          var text = await res.text().catch(function(){ return ''; });
          throw new Error(text || ('HTTP ' + res.status));
        }
        return await res.json();
      }

      async function setReservationStatus(adminKey, id, status) {
        var res = await fetch('/.netlify/functions/reservations-admin-set-status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          cache: 'no-store',
          body: JSON.stringify({ adminKey: adminKey, id: id, status: status })
        });

        if (!res.ok) {
          var text = await res.text().catch(function(){ return ''; });
          throw new Error(text || ('HTTP ' + res.status));
        }
        return await res.json();
      }

      async function deleteReservation(adminKey, id) {
        var res = await fetch('/.netlify/functions/reservations-admin-delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          cache: 'no-store',
          body: JSON.stringify({ adminKey: adminKey, id: id })
        });

        if (!res.ok) {
          var text = await res.text().catch(function(){ return ''; });
          throw new Error(text || ('HTTP ' + res.status));
        }

        return await res.json();
      }

      function renderReservations(reservations) {
        var hasAny = Array.isArray(reservations) && reservations.length > 0;

        if (!hasAny) {
          emptyState.style.display = 'block';
          results.style.display = 'block';
          setStatus(currentView === 'processed' ? 'All set. No processed reservations yet.' : 'All set. No reservations yet.', false);
          return;
        }

        emptyState.style.display = 'none';
        results.style.display = 'block';
        form.style.display = 'none';

        var nextStatusForView = currentView === 'processed' ? 'pending' : 'processed';
        var buttonLabelForView = currentView === 'processed' ? 'Restore' : 'Mark processed';

        reservations.forEach(function (r) {
          var tr = document.createElement('tr');
          var restoreButton = '';
          var markButton = '';
          var deleteButton = '';

          if (currentView === 'processed') {
            restoreButton = '<button type="button" class="status-btn" data-id="' + escapeHtml(r.id) + '" data-status="' + nextStatusForView + '">' + buttonLabelForView + '</button>';
            deleteButton =
              '<button type="button" class="delete-btn" data-id="' + escapeHtml(r.id) + '" aria-label="Delete processed reservation">' +
              '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
              '<path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
              '<path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
              '<path d="M6 6l1 16h10l1-16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
              '<path d="M10 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
              '<path d="M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
              '</svg>' +
              '</button>';
          } else {
            markButton = '<button type="button" class="status-btn" data-id="' + escapeHtml(r.id) + '" data-status="' + nextStatusForView + '">' + buttonLabelForView + '</button>';
          }

          var actionsHtml = '<div class="actions-cell">' + (currentView === 'processed' ? (restoreButton + deleteButton) : markButton) + '</div>';

          tr.innerHTML =
            '<td data-label="Guest">' + escapeHtml(r.name) + '</td>' +
            '<td data-label="Contact">' + escapeHtml(r.email) + '<br/>' + escapeHtml(r.phone) + '</td>' +
            '<td data-label="Date/Time">' + escapeHtml(r.reservation_date) + '<br/>' + escapeHtml(r.reservation_time) + '</td>' +
            '<td data-label="Party size">' + escapeHtml(r.party_size) + '</td>' +
            '<td data-label="Notes">' + escapeHtml(r.notes) + '</td>' +
            '<td data-label="Actions">' + actionsHtml + '</td>';
          tbody.appendChild(tr);
        });

        setStatus((currentView === 'processed' ? 'Processed reservations loaded: ' : 'Reservations loaded: ') + reservations.length, false);
      }

      function loadCurrentView() {
        if (!currentAdminKey) {
          setStatus('Enter password first.', false);
          return;
        }

        results.style.display = 'none';
        tbody.innerHTML = '';
        emptyState.style.display = 'none';
        setStatus(currentView === 'processed' ? 'Loading processed reservations...' : 'Loading reservations...', false);

        loadReservations(currentAdminKey, currentView)
          .then(function (reservations) {
            renderReservations(reservations);
          })
          .catch(function (err) {
            setStatus('Could not load. ' + (err && err.message ? err.message : ''), true);
            results.style.display = 'none';
            // If the key is invalid, clear it so the user needs to enter again.
            if (String(err && err.message ? err.message : '').toLowerCase().indexOf('unauthorized') !== -1) {
              clearAdminKey();
            }
          });
      }

      if (tabPending) {
        tabPending.addEventListener('click', function () {
          setActiveTab('pending');
          try { sessionStorage.setItem(ADMIN_VIEW_STORAGE, 'pending'); } catch (e) { /* ignore */ }
          loadCurrentView();
        });
      }

      if (tabProcessed) {
        tabProcessed.addEventListener('click', function () {
          setActiveTab('processed');
          try { sessionStorage.setItem(ADMIN_VIEW_STORAGE, 'processed'); } catch (e) { /* ignore */ }
          loadCurrentView();
        });
      }

      // Auto-login on refresh (manager key stored in sessionStorage after a successful access).
      (function autoLoadFromSession() {
        var savedKey = '';
        try { savedKey = sessionStorage.getItem(ADMIN_KEY_STORAGE) || ''; } catch (e) { savedKey = ''; }
        if (!savedKey) return;
        currentAdminKey = savedKey;
        var savedView = '';
        try { savedView = sessionStorage.getItem(ADMIN_VIEW_STORAGE) || ''; } catch (e) { savedView = ''; }
        if (savedView === 'processed' || savedView === 'pending') {
          setActiveTab(savedView);
        } else {
          setActiveTab('pending');
        }
        showTabs();
        form.style.display = 'none';
        loadCurrentView();
      })();

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        results.style.display = 'none';
        tbody.innerHTML = '';
        emptyState.style.display = 'none';

        var adminKey = document.getElementById('adminKey').value;
        currentAdminKey = adminKey;
        setStatus(currentView === 'processed' ? 'Loading processed reservations...' : 'Loading reservations...', false);

        try {
          var reservations = await loadReservations(adminKey, currentView);
          var hasAny = Array.isArray(reservations) && reservations.length > 0;

          // Password verified: show tabs and results section.
          showTabs();
          setAdminKey(adminKey);

          if (!hasAny) {
            emptyState.style.display = 'block';
            results.style.display = 'block';
            setStatus(currentView === 'processed' ? 'All set. No processed reservations yet.' : 'All set. No reservations yet.', false);
            form.style.display = 'none';
            return;
          }

          form.style.display = 'none';
          var nextStatus = currentView === 'processed' ? 'pending' : 'processed';
          var buttonLabel = currentView === 'processed' ? 'Restore' : 'Mark processed';
          reservations.forEach(function (r) {
            var tr = document.createElement('tr');
            var actionsHtml = '';

            if (currentView === 'processed') {
              actionsHtml =
                '<div class="actions-cell">' +
                '<button type="button" class="status-btn" data-id="' + escapeHtml(r.id) + '" data-status="' + nextStatus + '">' + buttonLabel + '</button>' +
                '<button type="button" class="delete-btn" data-id="' + escapeHtml(r.id) + '" aria-label="Delete processed reservation">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
                '<path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
                '<path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
                '<path d="M6 6l1 16h10l1-16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
                '<path d="M10 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
                '<path d="M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
                '</svg>' +
                '</button>' +
                '</div>';
            } else {
              actionsHtml =
                '<div class="actions-cell">' +
                '<button type="button" class="status-btn" data-id="' + escapeHtml(r.id) + '" data-status="' + nextStatus + '">' + buttonLabel + '</button>' +
                '</div>';
            }

            tr.innerHTML =
              '<td data-label="Guest">' + escapeHtml(r.name) + '</td>' +
              '<td data-label="Contact">' + escapeHtml(r.email) + '<br/>' + escapeHtml(r.phone) + '</td>' +
              '<td data-label="Date/Time">' + escapeHtml(r.reservation_date) + '<br/>' + escapeHtml(r.reservation_time) + '</td>' +
              '<td data-label="Party size">' + escapeHtml(r.party_size) + '</td>' +
              '<td data-label="Notes">' + escapeHtml(r.notes) + '</td>' +
              '<td data-label="Actions">' + actionsHtml + '</td>';

            tbody.appendChild(tr);
          });

          results.style.display = 'block';
          setStatus((currentView === 'processed' ? 'Processed reservations loaded: ' : 'Reservations loaded: ') + reservations.length, false);
        } catch (err) {
          setStatus('Could not load. Check the key or configuration. ' + (err && err.message ? err.message : ''), true);
          results.style.display = 'none';
          hideTabs();
          // Invalid key: clear stored key so the user can re-enter.
          if (String(err && err.message ? err.message : '').toLowerCase().indexOf('unauthorized') !== -1) {
            clearAdminKey();
          }
        }
      });

      tbody.addEventListener('click', async function (e) {
        var target = e.target;
        if (!target || !target.classList) return;

        var id = target.getAttribute('data-id');
        if (!id) return;

        var isStatusBtn = target.classList.contains('status-btn');
        var isDeleteBtn = target.classList.contains('delete-btn');

        if (!isStatusBtn && !isDeleteBtn) return;

        if (isStatusBtn) {
          var nextStatus = target.getAttribute('data-status');
          if (!nextStatus) return;
          if (!confirm('Update reservation status for ' + id + '?')) return;

          try {
            setStatus('Updating reservation...', false);
            var updateRes = await setReservationStatus(currentAdminKey, id, nextStatus);
            if (updateRes && updateRes.status) {
              setStatus('Updated to: ' + updateRes.status, false);
            }

            // Re-load the current tab with a small retry because Blobs can be eventually consistent.
            var attempts = 4;
            var refreshed = null;
            for (var i = 0; i < attempts; i++) {
              if (i > 0) {
                await new Promise(function (resolve) { setTimeout(resolve, 350 * i); });
              }
              refreshed = await loadReservations(currentAdminKey, currentView);
              var stillVisible = Array.isArray(refreshed) && refreshed.some(function (r) {
                return String(r && r.id ? r.id : '') === String(id);
              });
              if (!stillVisible) break;
            }

            tbody.innerHTML = '';
            emptyState.style.display = 'none';

            if (!Array.isArray(refreshed) || refreshed.length === 0) {
              emptyState.style.display = 'block';
              setStatus(currentView === 'processed' ? 'All set. No processed reservations yet.' : 'All set. No reservations yet.', false);
            } else {
              renderReservations(refreshed);
              results.style.display = 'block';
            }
          } catch (err) {
            setStatus('Could not update. ' + (err && err.message ? err.message : ''), true);
          }
        }

        if (isDeleteBtn) {
          if (!confirm('Delete processed reservation ' + id + '?')) return;

          try {
            setStatus('Deleting reservation...', false);
            await deleteReservation(currentAdminKey, id);

            // After delete, re-load with retry.
            var attempts2 = 3;
            var refreshed2 = null;
            for (var j = 0; j < attempts2; j++) {
              if (j > 0) {
                await new Promise(function (resolve) { setTimeout(resolve, 350 * j); });
              }
              refreshed2 = await loadReservations(currentAdminKey, currentView);
              var stillExists = Array.isArray(refreshed2) && refreshed2.some(function (r) {
                return String(r && r.id ? r.id : '') === String(id);
              });
              if (!stillExists) break;
            }

            tbody.innerHTML = '';
            emptyState.style.display = 'none';

            if (!Array.isArray(refreshed2) || refreshed2.length === 0) {
              emptyState.style.display = 'block';
              setStatus('All set. No processed reservations yet.', false);
            } else {
              renderReservations(refreshed2);
              results.style.display = 'block';
            }
          } catch (err) {
            setStatus('Could not delete. ' + (err && err.message ? err.message : ''), true);
          }
        }
      });
    })();
  </script>
</body>
</html>
